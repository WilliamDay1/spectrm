name: Daily data update

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest news
        run: python scripts/fetch_news.py

      - name: Fetch economic data (ONS, BoE, NHS)
        run: python scripts/fetch_economic.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --name-only data/
          fi

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "Spectrm Bot"
          git config user.email "bot@spectrm.app"
          git add data/news.json data/economic.json
          git commit -m "chore: auto-update news and economic data $(date -u +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "Data unchanged, no commit needed."
