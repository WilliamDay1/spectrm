name: Weekly polls update

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  update-polls:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch polling data
        run: python scripts/fetch_polls.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/polls.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "Spectrm Bot"
          git config user.email "bot@spectrm.app"
          git add data/polls.json
          git commit -m "chore: auto-update polling data $(date -u +%Y-%m-%d)"
          git push
